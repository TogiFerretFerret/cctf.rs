openapi: 3.0.3
info:
  title: api-title
  description: api-description
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: server-local-desc

tags:
  - name: auth
    description: tag-auth
  - name: challenges
    description: tag-challenges
  - name: scoreboard
    description: tag-scoreboard
  - name: teams
    description: tag-teams
  - name: notifications
    description: tag-notifications

security:
  - bearerAuth: []

paths:
  /api/v1/auth/register:
    post:
      tags: [auth]
      summary: op-register-summary
      security: []
      description: op-register-desc
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterPayload" }
      responses:
        "201":
          description: resp-account-created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Account" }
        "400": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }

  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: op-login-summary
      security: []
      description: op-login-desc
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginPayload" }
      responses:
        "200":
          description: resp-token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "401": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }

  /api/v1/auth/oauth/url:
    get:
      tags: [auth]
      summary: op-oauth-url-summary
      security: []
      responses:
        "200":
          description: resp-authorize-url
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string }
                required: [url]

  /api/v1/auth/oauth/callback:
    get:
      tags: [auth]
      summary: op-oauth-callback-summary
      security: []
      parameters:
        - name: code
          in: query
          required: true
          description: param-code-desc
          schema: { type: string }
      responses:
        "200":
          description: resp-token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "400": { $ref: "#/components/responses/Error" }

  /api/v1/challenges:
    get:
      tags: [challenges]
      summary: op-challenges-list-summary
      responses:
        "200":
          description: resp-challenge-list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PublicChallenge" }
        "401": { $ref: "#/components/responses/Error" }
    post:
      tags: [challenges]
      summary: op-challenge-create-summary
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Challenge" }
      responses:
        "201":
          description: resp-challenge-created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Challenge" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }

  /api/v1/challenges/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: param-challenge-id-desc
        schema: { type: string }
    get:
      tags: [challenges]
      summary: op-challenge-get-summary
      responses:
        "200":
          description: resp-challenge
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicChallenge" }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
    patch:
      tags: [challenges]
      summary: op-challenge-update-summary
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Challenge" }
      responses:
        "200":
          description: resp-challenge-updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Challenge" }
        "403": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }
    delete:
      tags: [challenges]
      summary: op-challenge-delete-summary
      description: op-challenge-delete-desc
      parameters:
        - name: delete_solves
          in: query
          required: false
          description: param-delete-solves-desc
          schema: { type: boolean, default: false }
      responses:
        "204": { description: resp-deleted }
        "403": { $ref: "#/components/responses/Error" }
        "500": { $ref: "#/components/responses/Error" }

  /api/v1/challenges/{id}/submit:
    post:
      tags: [challenges]
      summary: op-submit-summary
      description: op-submit-desc
      parameters:
        - name: id
          in: path
          required: true
          description: param-challenge-id-desc
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubmitFlagPayload" }
      responses:
        "200":
          description: resp-submission
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Submission" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }

  /api/v1/challenges/{id}/hints/{index}/unlock:
    post:
      tags: [challenges]
      summary: op-unlock-hint-summary
      description: op-unlock-hint-desc
      parameters:
        - name: id
          in: path
          required: true
          description: param-challenge-id-desc
          schema: { type: string }
        - name: index
          in: path
          required: true
          description: param-hint-index-desc
          schema: { type: integer }
      responses:
        "200":
          description: resp-hint-unlock
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnlockHintResponse" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  /api/v1/files:
    post:
      tags: [challenges]
      summary: op-upload-file-summary
      description: op-upload-file-desc
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
              required: [file]
      responses:
        "200":
          description: resp-file-uploaded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChallengeFile" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /api/v1/files/{id}:
    get:
      tags: [challenges]
      summary: op-download-file-summary
      description: op-download-file-desc
      parameters:
        - name: id
          in: path
          required: true
          description: param-file-id-desc
          schema: { type: string }
      responses:
        "200":
          description: resp-file-download
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  /api/v1/scoreboard:
    get:
      tags: [scoreboard]
      summary: op-scoreboard-summary
      security: []
      parameters:
        - name: bracket
          in: query
          required: false
          description: param-bracket-desc
          schema: { type: string }
      responses:
        "200":
          description: resp-standings
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ScoreboardEntry" }

  /api/v1/scoreboard/export:
    get:
      tags: [scoreboard]
      summary: op-scoreboard-export-summary
      security: []
      responses:
        "200":
          description: resp-ctftime-export
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CtfTimeScoreboardExport" }

  /api/v1/teams/invite:
    post:
      tags: [teams]
      summary: op-teams-invite-summary
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInvitePayload" }
      responses:
        "200":
          description: resp-invite
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  expires_at: { type: integer, format: int64 }
                required: [token, expires_at]
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  /api/v1/teams/join:
    post:
      tags: [teams]
      summary: op-teams-join-summary
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JoinTeamPayload" }
      responses:
        "200": { description: resp-joined }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  /api/v1/notifications:
    get:
      tags: [notifications]
      summary: op-notifications-list-summary
      description: op-notifications-list-desc
      security: []
      responses:
        "200":
          description: resp-notification-list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Notification" }
        "401": { $ref: "#/components/responses/Error" }
    post:
      tags: [notifications]
      summary: op-notification-create-summary
      description: op-notification-create-desc
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AnnouncePayload" }
      responses:
        "201":
          description: resp-notification-created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Notification" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }

  /api/v1/notifications/stream:
    get:
      tags: [notifications]
      summary: op-notifications-stream-summary
      description: op-notifications-stream-desc
      security: []
      responses:
        "200":
          description: resp-notification-stream
          content:
            text/event-stream:
              schema: { type: string }
        "401": { $ref: "#/components/responses/Error" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Error:
      description: resp-error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      properties:
        error: { type: string, description: schema-error-field }
      required: [error]

    RegisterPayload:
      type: object
      properties:
        username: { type: string }
        email: { type: string, nullable: true }
        password: { type: string }
      required: [username, password]

    LoginPayload:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
      required: [username, password]

    SubmitFlagPayload:
      type: object
      properties:
        flag: { type: string }
      required: [flag]

    CreateInvitePayload:
      type: object
      properties:
        team_id: { type: string }
        lifespan_hours: { type: integer, format: int64, nullable: true, description: schema-lifespan }
      required: [team_id]

    JoinTeamPayload:
      type: object
      properties:
        token: { type: string }
      required: [token]

    TokenResponse:
      type: object
      properties:
        token: { type: string }
      required: [token]

    AccountRole:
      type: string
      enum: [Admin, Player, Spectator]

    Account:
      type: object
      description: schema-account
      properties:
        id: { type: string }
        username: { type: string }
        email: { type: string, nullable: true }
        role: { $ref: "#/components/schemas/AccountRole" }
        team_id: { type: string, nullable: true }
        ctftime_id: { type: integer, nullable: true }
        fields: { type: object, additionalProperties: true }
        created_at: { type: integer, format: int64 }
      required: [id, username, role, fields, created_at]

    Submission:
      type: object
      properties:
        id: { type: string }
        challenge_id: { type: string }
        team_id: { type: string, nullable: true }
        account_id: { type: string }
        points: { type: integer }
        provided_flag: { type: string }
        is_correct: { type: boolean }
        submitted_at: { type: integer, format: int64 }
        submitted_ip: { type: string }
      required: [id, challenge_id, account_id, points, provided_flag, is_correct, submitted_at, submitted_ip]

    ScoreboardEntry:
      type: object
      properties:
        team_id: { type: string }
        team_name: { type: string }
        points: { type: integer }
        last_solve_time: { type: integer, format: int64, nullable: true }
        solves:
          type: array
          items: { type: string }
        rank: { type: integer }
      required: [team_id, team_name, points, solves, rank]

    CtfTimeTaskStats:
      type: object
      properties:
        points: { type: integer }
        time: { type: integer, format: int64 }
      required: [points, time]

    CtfTimeStandingsEntry:
      type: object
      properties:
        pos: { type: integer, nullable: true }
        team: { type: string }
        score: { type: number }
        taskStats:
          type: object
          additionalProperties: { $ref: "#/components/schemas/CtfTimeTaskStats" }
      required: [team, score, taskStats]

    CtfTimeScoreboardExport:
      type: object
      properties:
        tasks:
          type: array
          items: { type: string }
        standings:
          type: array
          items: { $ref: "#/components/schemas/CtfTimeStandingsEntry" }
      required: [tasks, standings]

    ChallengeFile:
      type: object
      properties:
        name: { type: string }
        url: { type: string }
        checksum_sha256: { type: string, nullable: true }
      required: [name, url]

    ChallengeRequirement:
      type: object
      description: schema-requirement
      properties:
        Solve: { type: string }

    PublicHint:
      type: object
      properties:
        cost: { type: integer, description: schema-points-live }
        unlocked: { type: boolean }
        content: { type: string, nullable: true, description: schema-rendered-html }
      required: [cost, unlocked]

    PublicChallenge:
      type: object
      description: schema-public-challenge
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string, description: schema-rendered-html }
        category: { type: string }
        points: { type: integer, nullable: true, description: schema-points-live }
        tags:
          type: array
          items: { type: string }
        files:
          type: array
          items: { $ref: "#/components/schemas/ChallengeFile" }
        hints:
          type: array
          items: { $ref: "#/components/schemas/PublicHint" }
        requirements:
          type: array
          items: { $ref: "#/components/schemas/ChallengeRequirement" }
        connection_info: { type: string, nullable: true }
        solved: { type: boolean }
        locked: { type: boolean, description: schema-challenge-locked }
      required: [id, title, description, category, tags, files, hints, requirements, solved, locked]

    ScoringMode:
      description: schema-scoring-mode
      oneOf:
        - type: string
          enum: [PointValue, PointAttribution]
        - type: object
          properties:
            DynamicDecay:
              type: object
              properties:
                initial: { type: integer }
                minimum: { type: integer }
                decay: { type: integer }
              required: [initial, minimum, decay]
          required: [DynamicDecay]

    ChallengePoints:
      type: object
      properties:
        mode: { $ref: "#/components/schemas/ScoringMode" }
        equation: { type: string }
      required: [mode, equation]

    PartialFlag:
      type: object
      properties:
        id: { type: string }
        validator: { $ref: "#/components/schemas/FlagValidator" }
        weight: { type: number }
      required: [id, validator, weight]

    FlagValidator:
      description: schema-flag-validator
      oneOf:
        - type: string
          enum: [Instanced]
        - type: object
          properties: { Static: { type: string } }
          required: [Static]
        - type: object
          properties: { Regex: { type: string } }
          required: [Regex]
        - type: object
          properties: { Script: { type: string } }
          required: [Script]
        - type: object
          properties:
            Multi:
              type: array
              items: { $ref: "#/components/schemas/PartialFlag" }
          required: [Multi]

    ChallengeDeployment:
      description: schema-deployment
      oneOf:
        - type: string
          enum: [None, Instanced]
        - type: object
          properties:
            Shared:
              type: object
              properties:
                url: { type: string }
              required: [url]
          required: [Shared]

    ChallengeAuthor:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
      required: [id, username]

    HintCost:
      description: schema-hint-cost
      oneOf:
        - type: object
          properties: { Fixed: { type: integer } }
          required: [Fixed]
        - type: object
          properties: { Script: { type: string } }
          required: [Script]

    ChallengeHint:
      type: object
      properties:
        content: { type: string, description: schema-hint-content }
        cost: { $ref: "#/components/schemas/HintCost" }
      required: [content, cost]

    UnlockHintResponse:
      type: object
      properties:
        content: { type: string }
        cost: { type: integer }
        already_unlocked: { type: boolean }
      required: [content, cost, already_unlocked]

    Challenge:
      type: object
      description: schema-challenge
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string, description: schema-rendered-html }
        category: { type: string }
        points: { $ref: "#/components/schemas/ChallengePoints" }
        flag: { $ref: "#/components/schemas/FlagValidator" }
        author: { $ref: "#/components/schemas/ChallengeAuthor" }
        hints:
          type: array
          items: { $ref: "#/components/schemas/ChallengeHint" }
        files:
          type: array
          items: { $ref: "#/components/schemas/ChallengeFile" }
        tags:
          type: array
          items: { type: string }
        requirements:
          type: array
          items: { $ref: "#/components/schemas/ChallengeRequirement" }
        team_consensus: { type: boolean }
        deployment: { $ref: "#/components/schemas/ChallengeDeployment" }
        visibility: { $ref: "#/components/schemas/ChallengeVisibility" }
        max_attempts:
          oneOf:
            - { $ref: "#/components/schemas/MaxAttempts" }
            - { type: "null" }
      required: [id, title, description, category, points, flag, author, hints, files, tags, requirements]

    AttemptCountMode:
      description: schema-attempt-count-mode
      type: string
      enum: [All, Unique, IncorrectOnly, UniqueIncorrect]

    MaxAttempts:
      type: object
      description: schema-max-attempts
      properties:
        limit: { type: integer }
        mode: { $ref: "#/components/schemas/AttemptCountMode" }
      required: [limit]

    LockedReveal:
      type: object
      description: schema-locked-reveal
      properties:
        description: { type: boolean }
        category: { type: boolean }
        points: { type: boolean }
        tags: { type: boolean }
        files: { type: boolean }
        hints: { type: boolean }
        requirements: { type: boolean }
        connection_info: { type: boolean }
      required: [description, category, points, tags, files, hints, requirements, connection_info]

    ChallengeVisibility:
      description: schema-visibility
      oneOf:
        - type: string
          enum: [Visible, Hidden]
        - type: object
          properties:
            Locked: { $ref: "#/components/schemas/LockedReveal" }
          required: [Locked]
    NotificationKind:
      type: string
      enum: [Announcement, Solve, FirstBlood]
    NotificationTarget:
      description: schema-notification-target
      oneOf:
        - type: string
          enum: [Everyone]
        - type: object
          properties: { Teams: { type: array, items: { type: string } } }
          required: [Teams]
        - type: object
          properties: { Accounts: { type: array, items: { type: string } } }
          required: [Accounts]
        - type: object
          properties: { Filter: { type: string } }
          required: [Filter]
    Notification:
      type: object
      properties:
        id: { type: string }
        kind: { $ref: "#/components/schemas/NotificationKind" }
        title: { type: string }
        message: { type: string, description: schema-rendered-html }
        target: { $ref: "#/components/schemas/NotificationTarget" }
        created_at: { type: integer, format: int64 }
      required: [id, kind, title, message, target, created_at]
    AnnouncePayload:
      description: schema-announce-payload
      type: object
      properties:
        title: { type: string }
        message: { type: string, description: schema-rendered-html }
        target: { $ref: "#/components/schemas/NotificationTarget" }
      required: [title, message]
